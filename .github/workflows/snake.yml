name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: platane/snk@v3
        with:
          github_user_name: harthikrm
          outputs: |
            github/snake/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit snake animation
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: "chore: update snake contribution graph"
          add: "github/snake/*.svg"
