name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: platane/snk@v3
        with:
          github_user_name: harthikrm
          outputs: |
            github/snake/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit snake animation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update snake contribution graph"
          file_pattern: github/snake/*.svg
